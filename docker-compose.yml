services:
  api:
    build: .
    command: pdm run dev
    env_file: .env.example
    environment:
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-local}
      VECTOR_STORE_PROVIDER: ${VECTOR_STORE_PROVIDER:-qdrant}
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
      - qdrant

  worker:
    build: .
    command: pdm run worker
    env_file: .env.example
    environment:
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-local}
      VECTOR_STORE_PROVIDER: ${VECTOR_STORE_PROVIDER:-qdrant}
    depends_on:
      - api
      - redis
      - qdrant

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: copilot
      POSTGRES_PASSWORD: copilot
      POSTGRES_DB: copilot
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant:v1.17.1
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  # Ollama is intentionally not started by Compose in the default local setup.
  # Run Ollama on the host instead:
  #   ollama pull llama3.1
  #   ollama pull nomic-embed-text
  #   ollama serve
  #
  # Then set:
  #   OLLAMA_BASE_URL=http://host.docker.internal:11434
  #
  # Uncomment this service only if you want Ollama to run inside Docker.
  # ollama:
  #   image: ollama/ollama:latest
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_data:/root/.ollama

  prometheus:
    image: prom/prometheus:v2.52.0
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:10.4.3
    ports:
      - "3000:3000"
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus

volumes:
  postgres_data:
  qdrant_data:
  # ollama_data:
